<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden;background:#000}
canvas{display:block;width:1080px;height:1350px}
</style>
</head>
<body>
<canvas id="cv" width="1080" height="1350"></canvas>
<script>
const GOLD='#c49911',WHITE='#ffffff',BLACK='#000000',W=1080,H=1350;
const B_INSET=28,B_THICK=3,PAD_L=56,PAD_R=56;
const NEWS_FS=46,BODY_FS_MAX=82,BODY_FS_MIN=36,BODY_FS_STP=2,FOOTER_FS=30;
const IMG_SPLIT=0.60,splitY=Math.round(H*IMG_SPLIT);
const IMAGE_BOTTOM=splitY+40+66;
const NEWS_TAG_X=PAD_L,NEWS_TAG_Y=splitY+40,NEWS_TAG_H=66;
const HL_TOP=NEWS_TAG_Y+NEWS_TAG_H+24;
const FOOTER_Y=H-B_INSET;

function getParams(){
  const p=new URLSearchParams(window.location.search);
  return{
    headline:(p.get('headline')||'').toUpperCase(),
    imageUrl:p.get('image')||'',
    token:p.get('token')||'',
    rowId:p.get('rowId')||'1',
    folderId:p.get('folderId')||''
  };
}

function heuristic(h){
  const stop=new Set(['IS','ARE','WAS','WERE','THE','A','AN','OF','IN','ON','AT','TO','FOR','AND','OR','BUT','WITH','BY','AS','THAT','THIS','IT','BE','HAS','HAVE','HAD','NOT','ONE','FROM','AFTER','BEFORE','ABOUT','INTO','JUST','ITS','THEIR','THERE','BEEN','WILL','WOULD','COULD','SHOULD','NOW','OUT','EVERY','WANTS','KICK','BY']);
  return h.toUpperCase().split(/\s+/).filter(w=>w.length>2&&!stop.has(w)).slice(0,3);
}

function drawBorder(ctx){
  ctx.strokeStyle=GOLD;ctx.lineWidth=B_THICK;
  ctx.strokeRect(B_INSET,B_INSET,W-B_INSET*2,H-B_INSET*2);
}

function drawFooter(ctx){
  const text='F A S H I O N U E R';
  ctx.font=`700 ${FOOTER_FS}px "League Spartan",sans-serif`;
  const tw=ctx.measureText(text).width;
  const textPad=20;
  ctx.fillStyle=BLACK;
  ctx.fillRect(W/2-tw/2-textPad,FOOTER_Y-FOOTER_FS/2-2,tw+textPad*2,FOOTER_FS+4);
  ctx.fillStyle=WHITE;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,W/2,FOOTER_Y);
  ctx.strokeStyle=GOLD;ctx.lineWidth=B_THICK;
  ctx.beginPath();ctx.moveTo(B_INSET+10,FOOTER_Y);ctx.lineTo(W/2-tw/2-textPad-24,FOOTER_Y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2+tw/2+textPad+24,FOOTER_Y);ctx.lineTo(W-B_INSET-10,FOOTER_Y);ctx.stroke();
}

function drawNewsTag(ctx){
  ctx.font=`bold ${NEWS_FS}px Arial,sans-serif`;
  const tw=ctx.measureText('NEWS').width;
  const pillW=tw+40,pillH=NEWS_TAG_H,x=NEWS_TAG_X,y=NEWS_TAG_Y;
  ctx.fillStyle=WHITE;
  ctx.fillRect(x,y,pillW,pillH);
  ctx.fillStyle=BLACK;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('NEWS',x+pillW/2,y+pillH/2);
}

function wrapLines(ctx,text,maxW){
  const words=text.split(/\s+/).filter(Boolean);const lines=[];let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=test;
  }
  if(cur)lines.push(cur);return lines;
}

function drawLine(ctx,line,x,y,fs,gw){
  ctx.font=`800 ${fs}px "League Spartan",sans-serif`;
  const words=line.split(' ');
  const spW=ctx.measureText(' ').width;
  const ww=words.map(w=>ctx.measureText(w).width);
  let cx=x;
  for(let i=0;i<words.length;i++){
    const wu=words[i].toUpperCase();
    const isG=gw.some(t=>t===wu||wu.includes(t)||t.includes(wu));
    ctx.fillStyle=isG?GOLD:WHITE;
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(words[i],cx,y);
    cx+=ww[i]+(i<words.length-1?spW:0);
  }
}

function draw(ctx,img,headline,gw){
  ctx.fillStyle=BLACK;ctx.fillRect(0,0,W,H);
  if(img){
    const tar=W/IMAGE_BOTTOM;const ar=img.width/img.height;
    let sx=0,sy=0,sw=img.width,sh=img.height;
    if(ar>tar){sw=sh*tar;sx=(img.width-sw)/2;}
    else{sh=sw/tar;sy=(img.height-sh)/2;}
    ctx.drawImage(img,sx,sy,sw,sh,0,0,W,IMAGE_BOTTOM);
  }
  const shTop=IMAGE_BOTTOM-320;
  const grad=ctx.createLinearGradient(0,shTop,0,IMAGE_BOTTOM+60);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(0.45,'rgba(0,0,0,0.55)');
  grad.addColorStop(0.75,'rgba(0,0,0,0.88)');
  grad.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle=grad;ctx.fillRect(0,shTop,W,IMAGE_BOTTOM+60-shTop);
  ctx.fillStyle=BLACK;ctx.fillRect(0,IMAGE_BOTTOM+60,W,H-(IMAGE_BOTTOM+60));
  drawNewsTag(ctx);
  if(headline){
    const maxW=W-PAD_L-PAD_R;
    const txTop=HL_TOP,txBot=FOOTER_Y-FOOTER_FS-40,txH=txBot-txTop;
    let fs=BODY_FS_MAX,lines=[],ok=false;
    while(fs>=BODY_FS_MIN){
      ctx.font=`800 ${fs}px "League Spartan",sans-serif`;
      lines=wrapLines(ctx,headline,maxW);
      if(lines.length*(fs*1.2)<=txH){ok=true;break;}
      fs-=BODY_FS_STP;
    }
    if(ok){
      const lh=fs*1.2;let y=txTop+fs*0.88;
      ctx.textBaseline='alphabetic';
      for(const line of lines){drawLine(ctx,line,PAD_L,y,fs,gw);y+=lh;}
    }
  }
  drawBorder(ctx);
  drawFooter(ctx);
}

// Upload canvas PNG directly to Google Drive
async function uploadToDrive(canvas, token, folderId, rowId){
  return new Promise((resolve, reject) => {
    canvas.toBlob(async (blob) => {
      try {
        const fileName = 'fashionuer-post-row' + rowId + '-' + Date.now() + '.png';

        // Step 1: Create file metadata
        const metadata = {
          name: fileName,
          mimeType: 'image/png',
          parents: [folderId]
        };

        // Step 2: Upload using multipart
        const formData = new FormData();
        formData.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
        formData.append('file', blob);

        const response = await fetch(
          'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink',
          {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
          }
        );

        if(!response.ok){
          const err = await response.text();
          reject(new Error('Drive upload failed: ' + err));
          return;
        }

        const data = await response.json();

        // Step 3: Make file publicly viewable
        await fetch(
          'https://www.googleapis.com/drive/v3/files/' + data.id + '/permissions',
          {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ role: 'reader', type: 'anyone' })
          }
        );

        resolve('https://drive.google.com/file/d/' + data.id + '/view');
      } catch(e) {
        reject(e);
      }
    }, 'image/png');
  });
}

async function main(){
  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,1500));

  const{headline,imageUrl,token,rowId,folderId}=getParams();
  const gw=heuristic(headline);
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');

  const finish = async () => {
    if(token && folderId){
      try {
        const driveLink = await uploadToDrive(cv, token, folderId, rowId);
        // Signal success back to Apps Script via title
        document.title = 'DONE:' + driveLink;
      } catch(e) {
        document.title = 'ERROR:' + e.message;
      }
    } else {
      document.title = 'READY';
    }
    document.body.setAttribute('data-ready','true');
  };

  if(imageUrl){
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{ draw(ctx,img,headline,gw); finish(); };
    img.onerror=()=>{ draw(ctx,null,headline,gw); finish(); };
    img.src=imageUrl;
  } else {
    draw(ctx,null,headline,gw);
    finish();
  }
}

main();
</script>
</body>
</html>
