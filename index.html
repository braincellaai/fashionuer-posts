<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden;background:#000}
canvas{display:block;width:1080px;height:1350px}

#status{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-family:sans-serif;gap:20px;
  z-index:999;
}
#status .spinner{
  width:52px;height:52px;border:4px solid #333;
  border-top-color:#c49911;border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#status-title{font-size:22px;font-weight:700;letter-spacing:0.05em;color:#fff}
#status-msg{font-size:16px;color:#888;letter-spacing:0.04em}

/* Fallback button — hidden until auto-download is confirmed blocked */
#dl-btn{
  display:none;
  margin-top:12px;
  padding:18px 56px;
  background:#c49911;
  color:#000;
  font-family:sans-serif;
  font-size:19px;
  font-weight:800;
  letter-spacing:0.07em;
  border:none;
  border-radius:6px;
  cursor:pointer;
  text-transform:uppercase;
}
#dl-btn:hover{background:#ddb820}
#dl-btn:active{transform:scale(0.97)}

#dl-anchor{
  position:fixed;top:-9999px;left:-9999px;
  width:1px;height:1px;opacity:0;pointer-events:none;
}
</style>
</head>
<body>

<div id="status">
  <div class="spinner" id="spinner"></div>
  <span id="status-title">FASHIONUER</span>
  <span id="status-msg">Building post…</span>
  <button id="dl-btn" onclick="triggerInstantDownload()">⬇ Download PNG</button>
</div>

<canvas id="cv" width="1080" height="1350"></canvas>
<a id="dl-anchor" tabindex="-1" aria-hidden="true"></a>

<script>
const GOLD='#c49911',WHITE='#ffffff',BLACK='#000000',W=1080,H=1350;
const B_INSET=28,B_THICK=3,PAD_L=56,PAD_R=56;
const NEWS_FS=46,BODY_FS_MAX=82,BODY_FS_MIN=36,BODY_FS_STP=2,FOOTER_FS=30;
const IMG_SPLIT=0.60,splitY=Math.round(H*IMG_SPLIT);
const IMAGE_BOTTOM=splitY+40+66;
const NEWS_TAG_X=PAD_L,NEWS_TAG_Y=splitY+40,NEWS_TAG_H=66;
const HL_TOP=NEWS_TAG_Y+NEWS_TAG_H+24;
const FOOTER_Y=H-B_INSET;

let _cachedBlobUrl=null;
let _rowId='1';

function getParams(){
  const p=new URLSearchParams(window.location.search);
  return{
    headline:(p.get('headline')||'').toUpperCase(),
    imageUrl:p.get('image')||'',
    rowId:p.get('rowId')||'1'
  };
}

function heuristic(h){
  const stop=new Set(['IS','ARE','WAS','WERE','THE','A','AN','OF','IN','ON','AT','TO','FOR','AND','OR','BUT','WITH','BY','AS','THAT','THIS','IT','BE','HAS','HAVE','HAD','NOT','ONE','FROM','AFTER','BEFORE','ABOUT','INTO','JUST','ITS','THEIR','THERE','BEEN','WILL','WOULD','COULD','SHOULD','NOW','OUT','EVERY','WANTS','KICK','BY']);
  return h.toUpperCase().split(/\s+/).filter(w=>w.length>2&&!stop.has(w)).slice(0,3);
}

function drawBorder(ctx){
  ctx.strokeStyle=GOLD;ctx.lineWidth=B_THICK;
  ctx.strokeRect(B_INSET,B_INSET,W-B_INSET*2,H-B_INSET*2);
}

function drawFooter(ctx){
  const text='F A S H I O N U E R';
  ctx.font=`700 ${FOOTER_FS}px "League Spartan",sans-serif`;
  const tw=ctx.measureText(text).width;
  const textPad=20;
  ctx.fillStyle=BLACK;
  ctx.fillRect(W/2-tw/2-textPad,FOOTER_Y-FOOTER_FS/2-2,tw+textPad*2,FOOTER_FS+4);
  ctx.fillStyle=WHITE;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,W/2,FOOTER_Y);
  ctx.strokeStyle=GOLD;ctx.lineWidth=B_THICK;
  ctx.beginPath();ctx.moveTo(B_INSET+10,FOOTER_Y);ctx.lineTo(W/2-tw/2-textPad-24,FOOTER_Y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2+tw/2+textPad+24,FOOTER_Y);ctx.lineTo(W-B_INSET-10,FOOTER_Y);ctx.stroke();
}

function drawNewsTag(ctx){
  ctx.font=`bold ${NEWS_FS}px Arial,sans-serif`;
  const tw=ctx.measureText('NEWS').width;
  const pillW=tw+40,pillH=NEWS_TAG_H,x=NEWS_TAG_X,y=NEWS_TAG_Y;
  ctx.fillStyle=WHITE;
  ctx.fillRect(x,y,pillW,pillH);
  ctx.fillStyle=BLACK;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('NEWS',x+pillW/2,y+pillH/2);
}

function wrapLines(ctx,text,maxW){
  const words=text.split(/\s+/).filter(Boolean);const lines=[];let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=test;
  }
  if(cur)lines.push(cur);return lines;
}

function drawLine(ctx,line,x,y,fs,gw){
  ctx.font=`800 ${fs}px "League Spartan",sans-serif`;
  const words=line.split(' ');
  const spW=ctx.measureText(' ').width;
  const ww=words.map(w=>ctx.measureText(w).width);
  let cx=x;
  for(let i=0;i<words.length;i++){
    const wu=words[i].toUpperCase();
    const isG=gw.some(t=>t===wu||wu.includes(t)||t.includes(wu));
    ctx.fillStyle=isG?GOLD:WHITE;
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(words[i],cx,y);
    cx+=ww[i]+(i<words.length-1?spW:0);
  }
}

function draw(ctx,img,headline,gw){
  ctx.fillStyle=BLACK;ctx.fillRect(0,0,W,H);
  if(img){
    const tar=W/H;const ar=img.width/img.height;
    let sx=0,sy=0,sw=img.width,sh=img.height;
    if(ar>tar){sw=sh*tar;sx=(img.width-sw)/2;}
    else{sh=sw/tar;sy=(img.height-sh)/2;}
    ctx.drawImage(img,sx,sy,sw,sh,0,0,W,H);
  }
  const gradStart=Math.round(H*0.25);
  const gradEnd=Math.round(H*0.78);
  const grad=ctx.createLinearGradient(0,gradStart,0,gradEnd);
  grad.addColorStop(0,   'rgba(0,0,0,0)');
  grad.addColorStop(0.15,'rgba(0,0,0,0.05)');
  grad.addColorStop(0.32,'rgba(0,0,0,0.22)');
  grad.addColorStop(0.50,'rgba(0,0,0,0.55)');
  grad.addColorStop(0.68,'rgba(0,0,0,0.82)');
  grad.addColorStop(0.82,'rgba(0,0,0,0.96)');
  grad.addColorStop(1,   'rgba(0,0,0,1)');
  ctx.fillStyle=grad;ctx.fillRect(0,gradStart,W,gradEnd-gradStart);
  ctx.fillStyle=BLACK;ctx.fillRect(0,gradEnd,W,H-gradEnd);
  drawNewsTag(ctx);
  if(headline){
    const maxW=W-PAD_L-PAD_R;
    const txTop=HL_TOP,txBot=FOOTER_Y-FOOTER_FS-40,txH=txBot-txTop;
    let fs=BODY_FS_MAX,lines=[],ok=false;
    while(fs>=BODY_FS_MIN){
      ctx.font=`800 ${fs}px "League Spartan",sans-serif`;
      lines=wrapLines(ctx,headline,maxW);
      if(lines.length*(fs*1.2)<=txH){ok=true;break;}
      fs-=BODY_FS_STP;
    }
    if(ok){
      const lh=fs*1.2;let y=txTop+fs*0.88;
      ctx.textBaseline='alphabetic';
      for(const line of lines){drawLine(ctx,line,PAD_L,y,fs,gw);y+=lh;}
    }
  }
  drawBorder(ctx);
  drawFooter(ctx);
}

function cacheCanvasBlob(canvas,rowId){
  return new Promise(resolve=>{
    canvas.toBlob(blob=>{
      if(_cachedBlobUrl) URL.revokeObjectURL(_cachedBlobUrl);
      _cachedBlobUrl=URL.createObjectURL(blob);
      const anchor=document.getElementById('dl-anchor');
      anchor.href=_cachedBlobUrl;
      anchor.download='fashionuer-post-row'+rowId+'.png';
      resolve(_cachedBlobUrl);
    },'image/png');
  });
}

function triggerInstantDownload(){
  if(!_cachedBlobUrl) return false;
  const anchor=document.getElementById('dl-anchor');
  anchor.click();
  return true;
}
window.triggerInstantDownload=triggerInstantDownload;

function showFallbackButton(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('status-msg').textContent='Your browser blocked auto-download.';
  document.getElementById('dl-btn').style.display='block';
}

function hideOverlay(){
  const el=document.getElementById('status');
  if(el) el.remove();
}

async function main(){
  await document.fonts.ready;

  const {headline,imageUrl,rowId}=getParams();
  _rowId=rowId;
  const gw=heuristic(headline);
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const statusMsg=document.getElementById('status-msg');

  const finish=async()=>{
    statusMsg.textContent='Almost ready…';
    await cacheCanvasBlob(cv,rowId);

    document.title='READY';
    document.body.setAttribute('data-ready','true');

    /* ── Auto-download attempt ── */
    /* We fire the anchor click. If the browser allows it, file saves immediately.
       If blocked (no prior gesture), the browser silently ignores it —
       so we show the fallback button after a short delay. */
    const anchor=document.getElementById('dl-anchor');
    anchor.click();

    /* Give browser ~800ms to handle the download.
       If nothing happened (tab still open, no save dialog), show button. */
    setTimeout(()=>{
      /* If tab is still visible/open, the auto-download either worked or was blocked.
         Either way we surface the button as a guaranteed fallback. */
      hideOverlay();

      /* Show a tiny floating fallback pill in the corner — non-intrusive */
      const pill=document.createElement('div');
      pill.innerHTML='<button onclick="triggerInstantDownload()" style="position:fixed;bottom:24px;right:24px;z-index:9999;padding:14px 32px;background:#c49911;color:#000;font-family:sans-serif;font-size:16px;font-weight:800;letter-spacing:0.06em;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase;box-shadow:0 4px 20px rgba(0,0,0,0.5);">⬇ Download PNG</button>';
      document.body.appendChild(pill);
    },800);
  };

  if(imageUrl){
    statusMsg.textContent='Loading image…';
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{ draw(ctx,img,headline,gw); finish(); };
    img.onerror=()=>{ draw(ctx,null,headline,gw); finish(); };
    img.src=imageUrl;
  } else {
    draw(ctx,null,headline,gw);
    await finish();
  }
}

main();
</script>
</body>
</html>
